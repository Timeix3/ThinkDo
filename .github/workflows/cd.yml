name: CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'
      - 'web/**'
      - 'docker-compose.production.yml'
      - '.github/workflows/cd.yml'

jobs:
  # ——————————————————————————————————————————
  # 1. CI-проверки
  # ——————————————————————————————————————————
  check-backend:
    name: Backend Check (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - run: dotnet restore server/server.sln
      - run: dotnet build server/server.sln --configuration Release --no-restore
      - run: dotnet test server/server.sln --configuration Release --no-build --verbosity normal

  check-frontend:
    name: Frontend Check (Java 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test (Maven)
        if: hashFiles('web/pom.xml') != ''
        working-directory: ./web
        run: ./mvnw clean package

      - name: Build & Test (Gradle)
        if: hashFiles('web/build.gradle') != ''
        working-directory: ./web
        run: ./gradlew build

  # ——————————————————————————————————————————
  # 2. Сборка и пуш образов
  # ——————————————————————————————————————————
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ check-backend, check-frontend ]
    outputs:
      short_sha: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      # Генерация короткого SHA
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Разрешаем runner'у пушить в insecure registry
      - name: Configure insecure registry
        run: |
          echo '{"insecure-registries": ["${{ secrets.VPS_IP }}:5000"]}' | \
            sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/AppApi/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.VPS_IP }}:5000/backend:latest
            ${{ secrets.VPS_IP }}:5000/backend:${{ steps.vars.outputs.sha_short }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.VPS_IP }}:5000/frontend:latest
            ${{ secrets.VPS_IP }}:5000/frontend:${{ steps.vars.outputs.sha_short }}

  # ——————————————————————————————————————————
  # 3. Деплой на VPS
  # ——————————————————————————————————————————
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [ build-and-push ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Create app directory on VPS
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} "mkdir -p ~/app"

      - name: Copy docker-compose to VPS
        run: |
          scp docker-compose.production.yml \
            ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }}:~/app/docker-compose.production.yml

      - name: Deploy
        run: |
          ssh ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_IP }} << 'EOF'
            cd ~/app
            docker compose -f docker-compose.production.yml pull -q
            docker compose -f docker-compose.production.yml up -d --remove-orphans
            docker image prune -f
          EOF