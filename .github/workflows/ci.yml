name: CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'server/**'
      - 'web/**'

jobs:
  build-backend:
    name: Backend Check (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore server/server.sln

      - name: Dotnet Format Check
        run: dotnet format server/server.sln --verify-no-changes --verbosity normal

      - name: Build projects
        run: dotnet build server/server.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test server/server.sln --configuration Release --no-build --verbosity normal

  build-frontend:
    name: Frontend Check (Java 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Java Lint (Maven)
        if: hashFiles('web/pom.xml') != ''
        working-directory: ./web
        run: ./mvnw spotless:check

      - name: Java Lint (Gradle)
        if: hashFiles('web/build.gradle') != ''
        working-directory: ./web
        run: ./gradlew spotlessCheck

      - name: Build & Test (Maven)
        if: hashFiles('web/pom.xml') != ''
        working-directory: ./web
        run: ./mvnw clean package

      - name: Build & Test (Gradle)
        if: hashFiles('web/build.gradle') != ''
        working-directory: ./web
        run: ./gradlew build