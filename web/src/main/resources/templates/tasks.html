<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обезьяна и Умник</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .nav-pill {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            backdrop-filter: blur(4px);
        }

        .kanban-col {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1rem;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .task-card {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            color: #1e293b;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #f97316;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            z-index: 40;
        }

        .fab:hover {
            transform: scale(1.1);
            background: #ea6c00;
        }

        #fabNavFocus:hover {
            background: #7c3aed !important;
        }

        /* Ripple wave — расходящееся кольцо ОТ кнопки наружу */
        @keyframes fabRippleOut {
            0% {
                width: 56px;
                height: 56px;
                opacity: 0.6;
            }

            100% {
                width: 180px;
                height: 180px;
                opacity: 0;
            }
        }

        .fab-ripple-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid rgba(249, 115, 22, 0.7);
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.35);
            pointer-events: none;
            animation: fabRippleOut 0.65s ease-out forwards;
        }

        /* Предупреждение переполнения инбокса */
        .inbox-overflow-warn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 0.6rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.72rem;
            font-weight: 600;
            line-height: 1.2;
            animation: warnPulse 2s ease-in-out infinite;
        }

        @keyframes warnPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal-box {
            background: white;
            border-radius: 1.5rem;
            padding: 1.75rem;
            width: 100%;
            max-width: 440px;
        }

        input[type="text"],
        textarea,
        input[type="date"] {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.6rem 0.85rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus,
        input[type="date"]:focus {
            border-color: #667eea;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            border-radius: 0.75rem;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            border-radius: 0.75rem;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-ghost {
            background: #f1f5f9;
            color: #64748b;
            border-radius: 0.75rem;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-ghost:hover {
            background: #e2e8f0;
        }

        .btn-success {
            background: #22c55e;
            color: white;
            border-radius: 0.75rem;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .nav-disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .active-page {
            background: rgba(255, 255, 255, 0.35) !important;
        }

        .nav-pill button {
            color: white;
        }

        @keyframes slideOutLeft {
            0% {
                transform: translateX(0);
                opacity: 1;
                max-height: 200px;
                margin-bottom: 0.75rem;
            }

            60% {
                transform: translateX(-120%);
                opacity: 0;
                max-height: 200px;
                margin-bottom: 0.75rem;
            }

            100% {
                transform: translateX(-120%);
                opacity: 0;
                max-height: 0;
                margin-bottom: 0;
                padding: 0;
            }
        }

        .task-completing {
            animation: slideOutLeft 0.4s ease-in forwards;
            overflow: hidden;
        }

        /* Чекбокс выполнения задачи */
        .task-check {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: transparent;
            font-size: 0.65rem;
        }

        .task-check:hover {
            border-color: #22c55e;
            background: #dcfce7;
            color: #22c55e;
        }

        /* Список задач */
        .task-list-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.25rem;
            overflow: hidden;
        }

        .task-list-item {
            background: white;
            border-radius: 1rem;
            padding: 0.85rem 1rem;
            margin-bottom: 0.75rem;
            color: #1e293b;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .task-list-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            padding: 0.15rem 0.55rem;
            border-radius: 0.5rem;
            font-weight: 500;
        }

        .date-badge-today {
            background: #dcfce7;
            color: #16a34a;
        }

        .date-badge-past {
            background: #fee2e2;
            color: #dc2626;
        }

        .date-badge-future {
            background: #e0e7ff;
            color: #4f46e5;
        }

        .date-badge-none {
            background: #f1f5f9;
            color: #94a3b8;
        }

        /* Инлайн-ввод инбокса */
        .inbox-inline-input {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            z-index: 42;
            width: 300px;
        }

        .inbox-inline-input .inbox-input-box {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .nav-pill button {
            color: white !important;
        }
    </style>
</head>

<body class="p-5">
    <div class="max-w-6xl mx-auto">

        <!-- Верхняя панель -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4 text-white">
            <div class="flex items-center gap-2">
                <i class="fas fa-brain text-2xl"></i>
                <span class="text-xl font-bold">Обезьяна и Умник</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm opacity-90" id="greetingText">Привет, <strong
                        id="accountName">Алексей</strong>!</span>
                <button id="logoutBtn"
                    class="bg-white/20 hover:bg-white/30 transition text-sm px-3 py-1 rounded-full flex items-center gap-1.5">
                    <i class="fas fa-sign-out-alt text-xs"></i> Выйти
                </button>
            </div>
        </div>

        <!-- Навигация по центру -->
        <div class="flex justify-center mb-6">
            <div class="nav-pill flex gap-2">
                <button data-page="dashboard" id="navDashboard" class="px-3 py-1 rounded-full active-page">📅
                    Доска</button>
                <button data-page="tasks" id="navTasks" class="px-3 py-1 rounded-full">📝 Задачи</button>
                <button data-page="inbox" id="navInbox" class="px-3 py-1 rounded-full">📥 Инбокс</button>
                <button data-page="projects" disabled class="px-3 py-1 rounded-full nav-disabled">📁 Проекты</button>
                <button data-page="routines" disabled class="px-3 py-1 rounded-full nav-disabled">🔄 Рутины</button>
            </div>
        </div>

        <!-- ====== Страница: Доска ====== -->
        <div id="pageDashboard">
            <div class="grid md:grid-cols-3 gap-5" id="kanbanBoard">
                <div class="kanban-col">
                    <h2 class="text-white font-bold text-lg mb-3">✅ На сегодня</h2>
                    <div id="colToday"></div>
                </div>
                <div class="kanban-col">
                    <h2 class="text-white font-bold text-lg mb-3">📋 В работе / Бэклог</h2>
                    <div id="colBacklog"></div>
                </div>
                <div class="kanban-col">
                    <h2 class="text-white font-bold text-lg mb-3">🔒 Заблокировано</h2>
                    <div id="colBlocked"></div>
                </div>
            </div>
        </div>

        <!-- ====== Страница: Задачи ====== -->
        <div id="pageTasks" class="hidden">
            <div class="task-list-container">
                <h2 class="text-white font-bold text-lg mb-4">📝 Все задачи</h2>
                <div id="taskListContent"></div>
            </div>
        </div>

        <!-- ====== Страница: Инбокс ====== -->
        <div id="pageInbox" class="hidden">
            <div class="task-list-container">
                <div class="flex items-center gap-3 mb-4">
                    <h2 class="text-white font-bold text-lg">📥 Инбокс</h2>
                    <span id="inboxOverflowBadge" class="inbox-overflow-warn hidden">
                        <i class="fas fa-exclamation-triangle text-[0.65rem]"></i>
                        <span id="inboxOverflowText"></span>
                    </span>
                </div>
                <div id="inboxListContent"></div>
            </div>
        </div>

    </div>

    <!-- FAB: Навигация на вторую страницу -->
    <a href="focus_page.html" class="fab" id="fabNavFocus"
        style="bottom: 2rem; left: 2rem; right: auto; background: #8b5cf6; font-size: 1.6rem; text-decoration: none;">
        🐒
    </a>

    <!-- FAB: Создать задачу (видна только на странице Задачи) -->
    <div class="fab hidden" id="fabAddTask"><i class="fas fa-plus"></i></div>

    <!-- FAB: Создать запись в инбокс (видна только на странице Инбокс) -->
    <div class="fab hidden" id="fabAddInbox"><i class="fas fa-plus" id="fabAddInboxIcon"></i></div>

    <!-- Инлайн-поле ввода для инбокса -->
    <div id="inboxInputBar" class="inbox-inline-input hidden">
        <div class="inbox-input-box">
            <input type="text" id="inboxInputField" placeholder="Быстрая запись в инбокс…"
                style="flex:1;border:1.5px solid #e2e8f0;border-radius:0.75rem;padding:0.5rem 0.75rem;font-size:0.9rem;outline:none;" />
        </div>
    </div>

    <!-- Модалка: Создание задачи -->
    <div id="createModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="text-lg font-bold text-slate-800 mb-4">➕ Новая задача</h2>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Название *</label>
                    <input type="text" id="createTitle" placeholder="Что нужно сделать?" />
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Описание</label>
                    <textarea id="createDesc" rows="3" placeholder="Подробности..."></textarea>
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Дата</label>
                    <input type="date" id="createDate" />
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-5">
                <button class="btn-ghost" id="createCancel">Отмена</button>
                <button class="btn-primary" id="createSave">Создать задачу</button>
            </div>
        </div>
    </div>

    <!-- Модалка: Редактирование задачи -->
    <div id="editModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="text-lg font-bold text-slate-800 mb-4">✏️ Редактировать задачу</h2>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Название *</label>
                    <input type="text" id="editTitle" placeholder="Название задачи" />
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Описание</label>
                    <textarea id="editDesc" rows="3" placeholder="Подробности..."></textarea>
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Дата</label>
                    <input type="date" id="editDate" />
                </div>
            </div>
            <div class="flex justify-between mt-5">
                <button class="btn-success" id="editComplete"><i class="fas fa-check mr-1.5"></i>Выполнить</button>
                <div class="flex gap-2">
                    <button class="btn-ghost" id="editCancel">Отмена</button>
                    <button class="btn-primary" id="editSave">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка: Редактирование записи инбокса -->
    <div id="inboxEditModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="text-lg font-bold text-slate-800 mb-4">✏️ Редактировать запись</h2>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Название *</label>
                    <input type="text" id="inboxEditTitle" placeholder="Название записи" />
                </div>
            </div>
            <div class="flex justify-between mt-5">
                <button class="btn-danger" id="inboxEditDelete"><i class="fas fa-trash-alt mr-1.5"></i>Удалить</button>
                <div class="flex gap-2">
                    <button class="btn-ghost" id="inboxEditCancel">Отмена</button>
                    <button class="btn-primary" id="inboxEditSave">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────
        let tasks = [];
        let editingTaskId = null;
        let taskCounter = 0;
        let currentPage = 'dashboard';

        // Inbox state
        let inboxItems = [];
        let inboxCounter = 0;
        let editingInboxId = null;
        let inboxInputOpen = false;

        // ── Helpers ────────────────────────────────────────────
        function getTodayStr() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${dd}`;
        }

        function formatDateRu(dateStr) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}.${y}`;
        }

        function dateBadgeClass(dateStr) {
            if (!dateStr) return 'date-badge-none';
            const today = getTodayStr();
            if (dateStr === today) return 'date-badge-today';
            if (dateStr < today) return 'date-badge-past';
            return 'date-badge-future';
        }

        function dateBadgeLabel(dateStr) {
            if (!dateStr) return 'Без даты';
            const today = getTodayStr();
            if (dateStr === today) return 'Сегодня';
            if (dateStr < today) return formatDateRu(dateStr);
            return formatDateRu(dateStr);
        }

        function escHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ── Плавная анимация высоты контейнера ─────────────────
        const ANIM_DURATION = 300; // мс

        /**
         * Оборачивает изменение содержимого контейнера в плавную анимацию высоты.
         * @param {HTMLElement} container — элемент, чью высоту анимируем
         * @param {Function} updateFn — колбэк, который меняет innerHTML / DOM внутри container
         */
        function animateContentChange(container, updateFn) {
            const startH = container.scrollHeight;
            updateFn();
            const endH = container.scrollHeight;

            if (startH === endH) return; // нет изменений — нечего анимировать

            container.style.height = startH + 'px';
            container.style.overflow = 'hidden';
            container.style.transition = `height ${ANIM_DURATION}ms ease`;

            requestAnimationFrame(() => {
                container.style.height = endH + 'px';
            });

            const cleanup = () => {
                container.style.height = '';
                container.style.overflow = '';
                container.style.transition = '';
            };
            container.addEventListener('transitionend', cleanup, { once: true });
            // страховка на случай, если transitionend не сработает
            setTimeout(cleanup, ANIM_DURATION + 50);
        }

        // ── Ripple wave effect for FAB buttons ─────────────────
        function spawnFabRipple(fabEl) {
            const ring = document.createElement('span');
            ring.className = 'fab-ripple-ring';
            fabEl.appendChild(ring);
            ring.addEventListener('animationend', () => ring.remove());
        }

        // ── Навигация ──────────────────────────────────────────
        function switchPage(page) {
            currentPage = page;

            // Активная кнопка
            document.querySelectorAll('.nav-pill button').forEach(btn => {
                btn.classList.remove('active-page');
                if (btn.dataset.page === page) btn.classList.add('active-page');
            });

            // Показ/скрытие страниц
            document.getElementById('pageDashboard').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('pageTasks').classList.toggle('hidden', page !== 'tasks');
            document.getElementById('pageInbox').classList.toggle('hidden', page !== 'inbox');

            // FAB: видна только на соответствующей странице
            document.getElementById('fabAddTask').classList.toggle('hidden', page !== 'tasks');
            document.getElementById('fabAddInbox').classList.toggle('hidden', page !== 'inbox');

            // Скрыть инлайн-ввод инбокса при смене страницы
            closeInboxInput();

            // Перерендер
            if (page === 'dashboard') renderBoard();
            if (page === 'tasks') renderTaskList();
            if (page === 'inbox') renderInboxList();
        }

        document.getElementById('navDashboard').addEventListener('click', () => switchPage('dashboard'));
        document.getElementById('navTasks').addEventListener('click', () => switchPage('tasks'));
        document.getElementById('navInbox').addEventListener('click', () => switchPage('inbox'));

        // ── Render: Доска (собственные колонки, без задач из navTasks) ──
        function renderBoard() {
            const emptyPlaceholder = '<div class="flex items-center justify-center h-24 text-white/30 text-sm font-medium">Пусто</div>';
            document.getElementById('colToday').innerHTML = emptyPlaceholder;
            document.getElementById('colBacklog').innerHTML = emptyPlaceholder;
            document.getElementById('colBlocked').innerHTML = emptyPlaceholder;
        }

        // ── Render: Список задач ───────────────────────────────
        function renderTaskList() {
            const container = document.getElementById('taskListContent');
            const sorted = [...tasks].sort((a, b) => b.createdAt - a.createdAt);

            animateContentChange(container, () => {
                if (sorted.length === 0) {
                    container.innerHTML = '<div class="flex items-center justify-center h-24 text-white/30 text-sm font-medium">Нет задач. Нажмите + чтобы создать.</div>';
                    return;
                }

                container.innerHTML = sorted.map(t => {
                    const badgeCls = dateBadgeClass(t.date);
                    const badgeLabel = dateBadgeLabel(t.date);
                    return `
                    <div class="task-list-item" data-id="${t.id}">
                        <div class="flex items-center gap-3">
                            <div class="flex-1 min-w-0 cursor-pointer" data-edit-id="${t.id}">
                                <div class="font-semibold text-slate-800 truncate mb-1">${escHtml(t.title)}</div>
                                ${t.desc ? `<p class="text-sm text-slate-500 line-clamp-2 mb-1.5">${escHtml(t.desc)}</p>` : ''}
                                <span class="date-badge ${badgeCls}">
                                    <i class="fas fa-calendar-alt text-[0.65rem]"></i>
                                    ${badgeLabel}
                                </span>
                            </div>
                            <div class="task-check shrink-0" data-complete-id="${t.id}" title="Выполнить">
                                <i class="fas fa-check"></i>
                            </div>
                        </div>
                    </div>
                `;
                }).join('');

                container.querySelectorAll('.task-check').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        completeTask(btn.dataset.completeId);
                    });
                });
                container.querySelectorAll('[data-edit-id]').forEach(area => {
                    area.addEventListener('click', () => openEditModal(area.dataset.editId));
                });
            });
        }

        // ── Create Task Modal ──────────────────────────────────

        // ── Выполнение задачи с анимацией ──────────────────────
        function completeTask(taskId) {
            const el = document.querySelector(`.task-list-item[data-id="${taskId}"]`);
            if (!el) return;

            // Зелёная галочка мгновенно
            const check = el.querySelector('.task-check');
            if (check) {
                check.style.borderColor = '#22c55e';
                check.style.background = '#22c55e';
                check.style.color = '#fff';
            }

            // Анимация уезжания влево
            el.classList.add('task-completing');
            el.addEventListener('animationend', () => {
                tasks = tasks.filter(t => t.id !== taskId);
                renderTaskList();
            }, { once: true });
        }

        function openCreateModal() {
            document.getElementById('createTitle').value = '';
            document.getElementById('createDesc').value = '';
            document.getElementById('createDate').value = '';
            document.getElementById('createModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('createTitle').focus(), 50);
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
        }

        document.getElementById('fabAddTask').addEventListener('click', () => {
            spawnFabRipple(document.getElementById('fabAddTask'));
            openCreateModal();
        });
        document.getElementById('createCancel').addEventListener('click', closeCreateModal);
        document.getElementById('createModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeCreateModal(); });

        document.getElementById('createSave').addEventListener('click', () => {
            const title = document.getElementById('createTitle').value.trim();
            if (!title) { document.getElementById('createTitle').focus(); return; }
            taskCounter++;
            tasks.push({
                id: 'task_' + taskCounter,
                title,
                desc: document.getElementById('createDesc').value.trim(),
                date: document.getElementById('createDate').value || '',
                createdAt: Date.now()
            });
            closeCreateModal();
            renderTaskList();
        });

        // ── Edit Task Modal ────────────────────────────────────
        function openEditModal(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            editingTaskId = taskId;
            document.getElementById('editTitle').value = task.title;
            document.getElementById('editDesc').value = task.desc || '';
            document.getElementById('editDate').value = task.date || '';
            document.getElementById('editModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('editTitle').focus(), 50);
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            editingTaskId = null;
        }

        document.getElementById('editCancel').addEventListener('click', closeEditModal);
        document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });

        document.getElementById('editComplete').addEventListener('click', () => {
            const taskId = editingTaskId;
            closeEditModal();
            if (currentPage === 'tasks') {
                completeTask(taskId);
            } else {
                tasks = tasks.filter(t => t.id !== taskId);
                if (currentPage === 'dashboard') renderBoard();
            }
        });

        document.getElementById('editSave').addEventListener('click', () => {
            const title = document.getElementById('editTitle').value.trim();
            if (!title) { document.getElementById('editTitle').focus(); return; }
            const task = tasks.find(t => t.id === editingTaskId);
            if (task) {
                task.title = title;
                task.desc = document.getElementById('editDesc').value.trim();
                task.date = document.getElementById('editDate').value || '';
            }
            closeEditModal();
            if (currentPage === 'dashboard') renderBoard();
            if (currentPage === 'tasks') renderTaskList();
        });

        // ── Render: Инбокс ─────────────────────────────────────
        function renderInboxList() {
            const container = document.getElementById('inboxListContent');
            const sorted = [...inboxItems].sort((a, b) => a.createdAt - b.createdAt);

            animateContentChange(container, () => {
                if (sorted.length === 0) {
                    container.innerHTML = '<div class="flex items-center justify-center h-24 text-white/30 text-sm font-medium">Нет записей. Нажмите + чтобы создать.</div>';
                    return;
                }

                container.innerHTML = sorted.map(item => {
                    const dateStr = formatDateRu(item.date);
                    return `
                    <div class="task-list-item" data-inbox-id="${item.id}">
                        <div class="flex items-start justify-between gap-3">
                            <div class="flex-1 min-w-0">
                                <div class="font-semibold text-slate-800 truncate mb-1">${escHtml(item.title)}</div>
                                <span class="date-badge date-badge-none">
                                    <i class="fas fa-calendar-alt text-[0.65rem]"></i>
                                    ${dateStr}
                                </span>
                            </div>
                            <i class="fas fa-pencil-alt text-slate-300 text-sm mt-1 shrink-0"></i>
                        </div>
                    </div>
                `;
                }).join('');

                container.querySelectorAll('.task-list-item').forEach(item => {
                    item.addEventListener('click', () => openInboxEditModal(item.dataset.inboxId));
                });
            });
        }

        // ── Inbox FAB: toggle ввод / создание записи ────────
        function closeInboxInput() {
            inboxInputOpen = false;
            document.getElementById('inboxInputBar').classList.add('hidden');
            document.getElementById('inboxInputField').value = '';
            document.getElementById('fabAddInboxIcon').className = 'fas fa-plus';
        }

        function updateInboxOverflowBadge() {
            const badge = document.getElementById('inboxOverflowBadge');
            const text = document.getElementById('inboxOverflowText');
            if (inboxItems.length > 10) {
                badge.classList.remove('hidden');
                text.textContent = `${inboxItems.length} записей — разберите инбокс!`;
            } else {
                badge.classList.add('hidden');
            }
        }

        document.getElementById('fabAddInbox').addEventListener('click', () => {
            const fab = document.getElementById('fabAddInbox');
            if (!inboxInputOpen) {
                // Первое нажатие — показать поле ввода + ripple
                spawnFabRipple(fab);
                inboxInputOpen = true;
                document.getElementById('inboxInputBar').classList.remove('hidden');
                document.getElementById('fabAddInboxIcon').className = 'fas fa-check';
                setTimeout(() => document.getElementById('inboxInputField').focus(), 50);
            } else {
                // Повторное нажатие — создать запись
                const title = document.getElementById('inboxInputField').value.trim();
                if (!title) {
                    document.getElementById('inboxInputField').focus();
                    return;
                }
                // Ripple wave при создании
                spawnFabRipple(fab);
                inboxCounter++;
                inboxItems.push({
                    id: 'inbox_' + inboxCounter,
                    title: title,
                    date: getTodayStr(),
                    createdAt: Date.now()
                });
                closeInboxInput();
                updateInboxOverflowBadge();
                if (currentPage === 'inbox') renderInboxList();
            }
        });

        // Enter для создания записи
        document.getElementById('inboxInputField').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('fabAddInbox').click();
            }
        });

        // ── Inbox Edit Modal ────────────────────────────────────
        function openInboxEditModal(itemId) {
            const item = inboxItems.find(i => i.id === itemId);
            if (!item) return;
            editingInboxId = itemId;
            document.getElementById('inboxEditTitle').value = item.title;
            document.getElementById('inboxEditModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('inboxEditTitle').focus(), 50);
        }

        function closeInboxEditModal() {
            document.getElementById('inboxEditModal').classList.add('hidden');
            editingInboxId = null;
        }

        document.getElementById('inboxEditCancel').addEventListener('click', closeInboxEditModal);
        document.getElementById('inboxEditModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeInboxEditModal(); });

        document.getElementById('inboxEditSave').addEventListener('click', () => {
            const title = document.getElementById('inboxEditTitle').value.trim();
            if (!title) { document.getElementById('inboxEditTitle').focus(); return; }
            const item = inboxItems.find(i => i.id === editingInboxId);
            if (item) {
                item.title = title;
            }
            closeInboxEditModal();
            renderInboxList();
        });

        document.getElementById('inboxEditDelete').addEventListener('click', () => {
            inboxItems = inboxItems.filter(i => i.id !== editingInboxId);
            closeInboxEditModal();
            renderInboxList();
            updateInboxOverflowBadge();
        });

        // ── Logout toggle ──────────────────────────────────────
        let loggedIn = true;
        document.getElementById('logoutBtn').addEventListener('click', () => {
            loggedIn = !loggedIn;
            const g = document.getElementById('greetingText');
            if (g) g.innerHTML = loggedIn
                ? 'Привет, <strong id="accountName">Алексей</strong>!'
                : 'Рады познакомиться, <strong id="accountName">Алексей</strong>!';
        });

        // ── Init ───────────────────────────────────────────────
        switchPage('dashboard');
    </script>
</body>

</html>
