<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Обезьяна и Умник</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .nav-pill {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            backdrop-filter: blur(4px);
        }

        .kanban-col {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1rem;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .task-card {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            color: #1e293b;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #f97316;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            z-index: 40;
        }

        .fab:hover {
            transform: scale(1.1);
            background: #ea6c00;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal-box {
            background: white;
            border-radius: 1.5rem;
            padding: 1.75rem;
            width: 100%;
            max-width: 440px;
        }

        input[type="text"],
        textarea,
        input[type="date"] {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.6rem 0.85rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        textarea:focus,
        input[type="date"]:focus {
            border-color: #667eea;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            border-radius: 0.75rem;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            border-radius: 0.75rem;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-ghost {
            background: #f1f5f9;
            color: #64748b;
            border-radius: 0.75rem;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-ghost:hover {
            background: #e2e8f0;
        }

        .btn-success {
            background: #22c55e;
            color: white;
            border-radius: 0.75rem;
            padding: 0.6rem 1.25rem;
            font-weight: 600;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .nav-disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .active-page {
            background: rgba(255, 255, 255, 0.35) !important;
        }

        /* ── Список задач / инбокса ─────────────────────────── */
        .task-list-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 1.25rem;
            overflow: hidden;
        }

        .task-list-item {
            background: white;
            border-radius: 1rem;
            padding: 0.85rem 1rem;
            margin-bottom: 0.75rem;
            color: #1e293b;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .task-list-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        /* ── Бейдж даты (Твой дизайн) ────────────────────────── */
        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            padding: 0.15rem 0.55rem;
            border-radius: 0.5rem;
            font-weight: 500;
        }

        .date-badge-none { background: #f1f5f9; color: #94a3b8; }
        .date-badge-today { background: #dcfce7; color: #16a34a; }
        .date-badge-past { background: #fee2e2; color: #dc2626; }
        .date-badge-future { background: #e0e7ff; color: #4f46e5; }

        /* ── Твой чекбокс ───────────────────────────────────── */
        .task-check {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: transparent;
            font-size: 0.65rem;
        }

        .task-check:hover {
            border-color: #22c55e;
            background: #dcfce7;
            color: #22c55e;
        }

        /* ── Предупреждение о переполнении инбокса ──────────── */
        .inbox-overflow-warn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 0.6rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.72rem;
            font-weight: 600;
            line-height: 1.2;
            animation: warnPulse 2s ease-in-out infinite;
        }

        @keyframes warnPulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.7; }
        }

        /* ── Inline-ввод инбокса ────────────────────────────── */
        .inbox-inline-input {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            z-index: 42;
            width: 300px;
        }

        .inbox-input-box {
            background: white;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        /* ── Ripple-волна FAB ───────────────────────────────── */
        @keyframes fabRippleOut {
            0%   { width: 56px; height: 56px; opacity: 0.6; }
            100% { width: 180px; height: 180px; opacity: 0; }
        }

        .fab-ripple-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid rgba(249, 115, 22, 0.7);
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.35);
            pointer-events: none;
            animation: fabRippleOut 0.65s ease-out forwards;
        }

        @keyframes slideOutLeft {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(-120%); opacity: 0; max-height: 0; margin: 0; padding: 0; }
        }

        .task-completing {
            animation: slideOutLeft 0.4s ease-in forwards;
            overflow: hidden;
        }
    </style>
</head>

<body class="p-5">
    <div class="max-w-6xl mx-auto">

        <!-- Верхняя панель -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4 text-white">
            <div class="flex items-center gap-2">
                <i class="fas fa-brain text-2xl"></i>
                <span class="text-xl font-bold">Обезьяна и Умник</span>
            </div>
            <div class="flex items-center gap-3">

                <!-- Не авторизован -->
                <div sec:authorize="isAnonymous()">
                    <a href="/oauth2/authorization/github"
                       class="bg-white/20 hover:bg-white/30 transition text-sm px-3 py-1 rounded-full flex items-center gap-1.5">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
                        </svg>
                        Войти через GitHub
                    </a>
                </div>

                <!-- Авторизован -->
                <div sec:authorize="isAuthenticated()" class="flex items-center gap-3">
                    <img th:src="${#authentication.principal.attributes['avatar_url']}"
                         alt="avatar" class="w-8 h-8 rounded-full border-2 border-white/50">
                    <span class="text-sm opacity-90">
                        Привет, <strong th:text="${#authentication.principal.attributes['login']}"></strong>!
                    </span>
                    <form th:action="@{/logout}" method="post" id="logoutForm">
                        <!-- Кнопка с вызовом функции очистки данных -->
                        <button type="submit" onclick="clearAllData()"
                                class="bg-white/20 hover:bg-white/30 transition text-sm px-3 py-1 rounded-full flex items-center gap-1.5">
                            <i class="fas fa-sign-out-alt text-xs"></i> Выйти
                        </button>
                    </form>
                </div>

            </div>
        </div>

        <!-- Навигация по центру -->
        <div class="flex justify-center mb-6">
            <div class="nav-pill flex gap-2 text-white">
                <button data-page="dashboard" id="navDashboard" class="px-3 py-1 rounded-full active-page">🗂 Доска</button>
                <button data-page="tasks" id="navTasks" class="px-3 py-1 rounded-full">📝 Задачи</button>
                <button data-page="inbox" id="navInbox" class="px-3 py-1 rounded-full">📥 Инбокс</button>
                <button disabled class="px-3 py-1 rounded-full nav-disabled">📁 Проекты</button>
                <button disabled class="px-3 py-1 rounded-full nav-disabled">🔄 Рутины</button>
            </div>
        </div>

        <!-- ====== Страница: Доска ====== -->
        <div id="pageDashboard">
            <div class="grid md:grid-cols-3 gap-5">
                <div class="kanban-col">
                    <h2 class="text-white font-bold text-lg mb-3">⚡ На сегодня</h2>
                    <div id="colToday"></div>
                </div>
                <div class="kanban-col">
                    <h2 class="text-white font-bold text-lg mb-3">🔧 В работе / Бэклог</h2>
                    <div id="colBacklog">
                        <div class="flex items-center justify-center h-24 text-white/30 text-sm font-medium">Пусто</div>
                    </div>
                </div>
                <div class="kanban-col">
                    <h2 class="text-white font-bold text-lg mb-3">🚧 Заблокировано</h2>
                    <div id="colBlocked">
                        <div class="flex items-center justify-center h-24 text-white/30 text-sm font-medium">—</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ====== Страница: Задачи (Твой контент) ====== -->
        <div id="pageTasks" class="hidden">
            <div class="task-list-container">
                <h2 class="text-white font-bold text-lg mb-4">📝 Список всех задач</h2>
                <div id="taskListContent"></div>
            </div>
        </div>

        <!-- ====== Страница: Инбокс ====== -->
        <div id="pageInbox" class="hidden">
            <div class="task-list-container">
                <div class="flex items-center gap-3 mb-4">
                    <h2 class="text-white font-bold text-lg">📥 Инбокс</h2>
                    <span id="inboxOverflowBadge" class="inbox-overflow-warn hidden">
                        <i class="fas fa-exclamation-triangle text-[0.65rem]"></i>
                        <span id="inboxOverflowText"></span>
                    </span>
                </div>
                <div id="inboxListContent"></div>
            </div>
        </div>

    </div>

    <!-- FAB: Создать задачу (Скрыта на Доске) -->
    <div class="fab hidden" id="fabAddTask"><i class="fas fa-plus"></i></div>

    <!-- FAB: Навигация на обезьяну -->
    <a href="/" class="fab" id="fabNavFocus" style="bottom: 2rem; left: 2rem; right: auto; background: #8b5cf6; font-size: 1.6rem; text-decoration: none;">
        🐒
    </a>

    <!-- FAB: Добавить в инбокс (Видна в Инбоксе) -->
    <div class="fab hidden" id="fabAddInbox" style="position:fixed;">
        <i class="fas fa-plus" id="fabAddInboxIcon"></i>
    </div>

    <!-- Inline-поле ввода для инбокса -->
    <div id="inboxInputBar" class="inbox-inline-input hidden">
        <div class="inbox-input-box">
            <input type="text" id="inboxInputField"
                   placeholder="Быстрая запись в инбокс…"
                   style="flex:1;border:1.5px solid #e2e8f0;border-radius:0.75rem;padding:0.5rem 0.75rem;font-size:0.9rem;outline:none;" />
        </div>
    </div>

    <!-- Модалка: Создание задачи -->
    <div id="createModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="text-lg font-bold text-slate-800 mb-4">➕ Новая задача</h2>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Название *</label>
                    <input type="text" id="createTitle" placeholder="Что нужно сделать?" />
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Контент</label>
                    <textarea id="createDesc" rows="3" placeholder="Подробности..."></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-5">
                <button class="btn-ghost" id="createCancel">Отмена</button>
                <button class="btn-primary" id="createSave">Создать задачу</button>
            </div>
        </div>
    </div>

    <!-- Модалка: Редактировать задачу -->
    <div id="editModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="text-lg font-bold text-slate-800 mb-4">✏️ Редактировать задачу</h2>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Название *</label>
                    <input type="text" id="editTitle" placeholder="Название задачи" />
                </div>
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Контент</label>
                    <textarea id="editDesc" rows="3" placeholder="Подробности..."></textarea>
                </div>
            </div>
            <!-- Секция кнопок с динамическим выравниванием -->
            <div class="flex justify-between mt-5" id="editModalFooter">
                <button class="btn-success" id="editComplete">✓ Выполнено</button>
                <div class="flex gap-2">
                    <button class="btn-ghost" id="editCancel">Отмена</button>
                    <button class="btn-primary" id="editSave">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка: Редактирование записи инбокса -->
    <div id="inboxEditModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 class="text-lg font-bold text-slate-800 mb-4">✏️ Редактировать запись</h2>
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-sm font-medium text-slate-600 mb-1 block">Название *</label>
                    <input type="text" id="inboxEditTitle" placeholder="Название записи" />
                </div>
            </div>
            <div class="flex justify-between mt-5">
                <button class="btn-danger" id="inboxEditDelete">
                    <i class="fas fa-trash-alt mr-1.5"></i>Удалить
                </button>
                <div class="flex gap-2">
                    <button class="btn-ghost" id="inboxEditCancel">Отмена</button>
                    <button class="btn-primary" id="inboxEditSave">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/tasks';
        const INBOX_API_URL = '/api/inbox';

        let editingTaskId = null;
        let editingInboxId = null;
        let allTasks = []; // Общее состояние

        // ── Helpers ────────────────────────────────────────────
        function escHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function emptyPlaceholder() {
            return '<div class="flex items-center justify-center h-24 text-white/30 text-sm font-medium">Пусто</div>';
        }

        // Форматирование даты
        function formatDateRu(dateStr) {
            if (!dateStr) return '';
            const datePart = dateStr.split('T')[0];
            const [y, m, d] = datePart.split('-');
            return `${d}.${m}.${y}`;
        }

        // ── Render Dashboard (Канбан) ──────────────────────────
        function renderBoard(tasks) {
            const col = document.getElementById('colToday');
            if (!tasks.length) {
                col.innerHTML = emptyPlaceholder();
                return;
            }
            col.innerHTML = tasks.map(t => `
                <div class="task-card" data-id="${t.id}">
                    <div class="flex items-start justify-between gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-slate-800 truncate">${escHtml(t.title)}</div>
                            ${t.content ? `<p class="text-xs text-slate-500 mt-0.5 truncate">${escHtml(t.content)}</p>` : ''}
                        </div>
                        <i class="fas fa-pencil-alt text-slate-300 text-xs mt-1 shrink-0"></i>
                    </div>
                </div>
            `).join('');

            col.querySelectorAll('.task-card').forEach(card => {
                card.addEventListener('click', () => openEditModal(card.dataset.id, tasks));
            });
        }

        // ── Render ТВОЕГО списка задач (Отображение контента) ──
        function renderTaskList(tasks) {
            const container = document.getElementById('taskListContent');
            if (!tasks.length) {
                container.innerHTML = '<div class="text-white/50 text-center py-10 font-medium">Нет задач. Создайте первую во вкладке "Задачи"!</div>';
                return;
            }

            container.innerHTML = tasks.sort((a,b) => b.id - a.id).map(t => {
                const dateLabel = formatDateRu(t.createdAt || new Date().toISOString());
                return `
                <div class="task-list-item" id="task-row-${t.id}">
                    <div class="flex items-center gap-3">
                        <div class="task-check shrink-0" onclick="completeTask(${t.id})" title="Выполнить">
                            <i class="fas fa-check"></i>
                        </div>
                        <div class="flex-1 min-w-0 cursor-pointer" onclick="openEditModal(${t.id}, allTasks)">
                            <div class="font-semibold text-slate-800 truncate">${escHtml(t.title)}</div>
                            <!-- Описание задачи (контент) -->
                            ${t.content ? `<p class="text-xs text-slate-500 mt-0.5 truncate">${escHtml(t.content)}</p>` : ''}
                            <span class="date-badge date-badge-none">
                                <i class="fas fa-calendar-alt text-[0.65rem]"></i>
                                ${dateLabel}
                            </span>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        // ── Load tasks (API) ───────────────────────────────────
        async function loadTasks() {
            try {
                const res = await fetch(API_URL);
                allTasks = await res.json();
                renderBoard(allTasks);
                renderTaskList(allTasks);
            } catch (e) {
                document.getElementById('colToday').innerHTML =
                    '<div class="task-card text-red-400 text-sm cursor-default">⚠️ Бэкенд недоступен</div>';
            }
        }

        // ── Create Task ────────────────────────────────────────
        function openCreateModal() {
            document.getElementById('createTitle').value = '';
            document.getElementById('createDesc').value = '';
            document.getElementById('createModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('createTitle').focus(), 50);
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.add('hidden');
        }

        document.getElementById('fabAddTask').addEventListener('click', openCreateModal);
        document.getElementById('createCancel').addEventListener('click', closeCreateModal);
        document.getElementById('createModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeCreateModal();
        });

        document.getElementById('createSave').addEventListener('click', async () => {
            const titleInput = document.getElementById('createTitle');
            const title = titleInput.value.trim();
            if (!title) { titleInput.focus(); return; }
            
            const btn = document.getElementById('createSave');
            btn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        title, 
                        content: document.getElementById('createDesc').value.trim()
                    })
                });
                closeCreateModal();
                loadTasks();
            } finally {
                btn.disabled = false;
            }
        });

        // ── Edit Task ──────────────────────────────────────────
        function openEditModal(taskId, tasks) {
            const task = tasks.find(t => String(t.id) === String(taskId));
            if (!task) return;
            editingTaskId = task.id;
            document.getElementById('editTitle').value = task.title;
            document.getElementById('editDesc').value = task.content ?? '';
            
            const completeBtn = document.getElementById('editComplete');
            const footer = document.getElementById('editModalFooter');
            
            if (currentPage === 'dashboard') {
                completeBtn.classList.add('hidden');
                footer.classList.remove('justify-between');
                footer.classList.add('justify-end'); 
            } else {
                completeBtn.classList.remove('hidden');
                footer.classList.remove('justify-end');
                footer.classList.add('justify-between');
            }

            document.getElementById('editModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('editTitle').focus(), 50);
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            editingTaskId = null;
        }

        document.getElementById('editCancel').addEventListener('click', closeEditModal);
        document.getElementById('editModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeEditModal();
        });

        document.getElementById('editSave').addEventListener('click', async () => {
            const title = document.getElementById('editTitle').value.trim();
            if (!title) { document.getElementById('editTitle').focus(); return; }
            await fetch(`${API_URL}/${editingTaskId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    title, 
                    content: document.getElementById('editDesc').value.trim()
                })
            });
            closeEditModal();
            loadTasks();
        });

        // ── Complete (Task 2.7 с анимацией) ────────────────────
        async function completeTask(id) {
            const row = document.getElementById(`task-row-${id}`);
            const card = document.querySelector(`.task-card[data-id="${id}"]`);
            const target = row || card;

            if (target) {
                target.classList.add('task-completing');
                target.addEventListener('animationend', async () => {
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    loadTasks();
                }, { once: true });
            } else {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadTasks();
            }
        }

        document.getElementById('editComplete').addEventListener('click', () => {
            const id = editingTaskId;
            closeEditModal();
            completeTask(id);
        });

        // ── Navigation ─────────────────────────────────────────
        let currentPage = 'dashboard';

        function switchPage(page) {
            currentPage = page;

            document.getElementById('pageDashboard').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('pageTasks').classList.toggle('hidden', page !== 'tasks');
            document.getElementById('pageInbox').classList.toggle('hidden', page !== 'inbox');

            document.querySelectorAll('.nav-pill button[data-page]').forEach(btn => {
                btn.classList.toggle('active-page', btn.dataset.page === page);
            });

            document.getElementById('fabAddTask').classList.toggle('hidden', page !== 'tasks');
            document.getElementById('fabAddInbox').classList.toggle('hidden', page !== 'inbox');

            closeInboxInput();
            if (page === 'inbox') inboxLoad();
        }

        document.getElementById('navDashboard').addEventListener('click', () => switchPage('dashboard'));
        document.getElementById('navTasks').addEventListener('click', () => switchPage('tasks'));
        document.getElementById('navInbox').addEventListener('click', () => switchPage('inbox'));

        // ── Инбокс (Логика коллег полностью сохранена) ────────
        let inboxItems = [];
        let inboxCounter = 0;

        async function inboxLoad() {
            try {
                const res = await fetch(INBOX_API_URL);
                if (!res.ok) throw new Error('API not ready');
                inboxItems = await res.json();
            } catch { }
            renderInboxList();
            updateInboxOverflowBadge();
        }

        async function inboxCreate(title) {
            try {
                const res = await fetch(INBOX_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (!res.ok) throw new Error('API not ready');
                await inboxLoad();
            } catch { 
                inboxCounter++;
                inboxItems.push({ id: 'inbox_' + inboxCounter, title, createdAt: new Date().toISOString() });
                renderInboxList();
                updateInboxOverflowBadge();
            }
        }

        function renderInboxList() {
            const container = document.getElementById('inboxListContent');
            const sorted = [...inboxItems].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            if (sorted.length === 0) {
                container.innerHTML = '<div class="flex items-center justify-center h-24 text-white/30 text-sm font-medium">Нет записей. Нажмите + чтобы добавить.</div>';
                return;
            }
            container.innerHTML = sorted.map(item => `
                <div class="task-list-item" data-inbox-id="${escHtml(String(item.id))}">
                    <div class="flex items-start justify-between gap-3">
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-slate-800 truncate mb-1">${escHtml(item.title)}</div>
                        </div>
                        <i class="fas fa-pencil-alt text-slate-300 text-sm mt-1 shrink-0"></i>
                    </div>
                </div>
            `).join('');

            container.querySelectorAll('.task-list-item').forEach(el => {
                el.addEventListener('click', () => openInboxEditModal(el.dataset.inboxId));
            });
        }

        async function toggleInboxInput() {
            const bar = document.getElementById('inboxInputBar');
            const icon = document.getElementById('fabAddInboxIcon');
            if (bar.classList.contains('hidden')) {
                bar.classList.remove('hidden');
                icon.className = 'fas fa-check';
                document.getElementById('inboxInputField').focus();
            } else {
                const val = document.getElementById('inboxInputField').value.trim();
                if (val) {
                    await inboxCreate(val);
                }
                closeInboxInput();
            }
        }

        function closeInboxInput() {
            document.getElementById('inboxInputBar').classList.add('hidden');
            document.getElementById('fabAddInboxIcon').className = 'fas fa-plus';
            document.getElementById('inboxInputField').value = '';
        }

        document.getElementById('fabAddInbox').addEventListener('click', toggleInboxInput);
        document.getElementById('inboxInputField').addEventListener('keydown', e => {
            if (e.key === 'Enter') toggleInboxInput();
            if (e.key === 'Escape') closeInboxInput();
        });

        function updateInboxOverflowBadge() {
            const badge = document.getElementById('inboxOverflowBadge');
            badge.classList.toggle('hidden', inboxItems.length <= 10);
            if (!badge.classList.contains('hidden')) {
                document.getElementById('inboxOverflowText').textContent = `${inboxItems.length} записей!`;
            }
        }

        function openInboxEditModal(itemId) {
            const item = inboxItems.find(i => String(i.id) === String(itemId));
            if (!item) return;
            editingInboxId = itemId;
            document.getElementById('inboxEditTitle').value = item.title;
            document.getElementById('inboxEditModal').classList.remove('hidden');
        }

        function closeInboxEditModal() { document.getElementById('inboxEditModal').classList.add('hidden'); }
        document.getElementById('inboxEditCancel').addEventListener('click', closeInboxEditModal);

        document.getElementById('inboxEditSave').addEventListener('click', async () => {
            const title = document.getElementById('inboxEditTitle').value.trim();
            try {
                const res = await fetch(`${INBOX_API_URL}/${editingInboxId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (!res.ok) throw new Error();
                await inboxLoad();
            } catch {
                const item = inboxItems.find(i => String(i.id) === String(editingInboxId));
                if (item) item.title = title;
                renderInboxList();
            }
            closeInboxEditModal();
        });

        document.getElementById('inboxEditDelete').addEventListener('click', async () => {
            try {
                const res = await fetch(`${INBOX_API_URL}/${editingInboxId}`, { method: 'DELETE' });
                if (!res.ok) throw new Error();
                await inboxLoad();
            } catch {
                inboxItems = inboxItems.filter(i => String(i.id) !== String(editingInboxId));
                renderInboxList();
                updateInboxOverflowBadge();
            }
            closeInboxEditModal();
        });

        function clearAllData() {
            try { localStorage.clear(); sessionStorage.clear(); } catch (e) { }
            document.cookie.split(";").forEach(function (cookie) {
                var name = cookie.split("=")[0].trim();
                if (name) {
                    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
                    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" + window.location.hostname;
                }
            });
            if (window.indexedDB) {
                indexedDB.databases().then(dbs => {
                    dbs.forEach(db => { if (db.name) indexedDB.deleteDatabase(db.name); });
                }).catch(() => { });
            }
            if ('caches' in window) {
                caches.keys().then(names => { names.forEach(name => caches.delete(name)); });
            }
        }

        loadTasks();
    </script>
</body>

</html>
