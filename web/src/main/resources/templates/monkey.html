<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фокус — Обезьяна и Умник</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/buttons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* ── Focus card ── */
        .focus-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            max-width: 520px;
            width: 100%;
            color: #1e293b;
            box-shadow: 0 25px 60px rgba(0,0,0,0.18);
            position: relative;
        }
        /* ── Чекбокс ── */
        .focus-check {
            width: 32px;
            height: 32px;
            min-width: 32px;
            border: 2.5px solid #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s;
            color: transparent;
            font-size: 0.85rem;
        }

            .focus-check:hover {
                border-color: #22c55e;
                background: #dcfce7;
                color: #22c55e;
            }

            .focus-check.checked {
                border-color: #22c55e;
                background: #22c55e;
                color: #fff;
            }
        /* ── Анимация: задача уезжает влево ── */
        @keyframes taskSlideOutLeft {
            0% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateX(-140%) scale(0.85);
                opacity: 0;
            }
        }

        .task-leaving {
            animation: taskSlideOutLeft 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        /* ── Анимация: следующая задача выезжает из глубины ── */
        @keyframes taskEmergeFromDepth {
            0% {
                transform: scale(0.6) translateY(40px);
                opacity: 0;
                filter: blur(6px);
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
                filter: blur(0);
            }
        }

        .task-entering {
            animation: taskEmergeFromDepth 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        /* ── Пустое состояние / Загрузка / Ошибка ── */
        .empty-state {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 1.1rem;
            font-weight: 500;
            padding: 3rem 1rem;
        }

            .empty-state i {
                font-size: 3rem;
                display: block;
                margin-bottom: 1rem;
                opacity: 0.4;
            }
        /* ── Счётчик задач ── */
        .task-counter {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 0.35rem 0.9rem;
            font-size: 0.8rem;
            color: white;
            font-weight: 600;
        }
        /* ── Декоративные кольца на фоне ── */
        .bg-ring {
            position: fixed;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
        }

        /* Модалка капчи (локальные стили) */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
        }

        .modal-box {
            background: white;
            border-radius: 1rem;
            padding: 1.25rem;
            width: 100%;
            max-width: 420px;
            color: #1e293b;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }

        .captcha-question {
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
        }

        .captcha-error {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            min-height: 1.1rem;
        }

        /* ── Инлайн-ввод инбокса (фокус-страница) ── */
        .focus-inbox-input {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            z-index: 42;
            width: 280px;
        }

            .focus-inbox-input .inbox-input-box {
                background: white;
                border-radius: 1rem;
                padding: 0.75rem 1rem;
                box-shadow: 0 10px 30px rgba(0,0,0,0.25);
                display: flex;
                gap: 0.5rem;
                align-items: center;
            }

        /* ── Ripple для FAB фокус-страницы ── */
        @keyframes fabRippleOut {
            0% {
                width: 56px;
                height: 56px;
                opacity: 0.6;
            }

            100% {
                width: 180px;
                height: 180px;
                opacity: 0;
            }
        }

        .fab-ripple-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid rgba(249, 115, 22, 0.7);
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.35);
            pointer-events: none;
            animation: fabRippleOut 0.65s ease-out forwards;
        }
    </style>
</head>
<body class="p-5">
    <!-- Декоративные кольца -->
    <div class="bg-ring" style="width:500px;height:500px;top:-100px;right:-120px;"></div>
    <div class="bg-ring" style="width:350px;height:350px;bottom:-80px;left:-60px;"></div>
    <div class="bg-ring" style="width:200px;height:200px;top:30%;left:10%;"></div>
    <div class="max-w-6xl mx-auto">
        <!-- Верхняя панель — идентична главной -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4 text-white">
            <div class="flex items-center gap-2">
                <i class="fas fa-brain text-2xl"></i>
                <span class="text-xl font-bold">Обезьяна и Умник</span>
            </div>
            <div class="flex items-center gap-3">
                <span class="task-counter" id="taskCounter">0 / 0</span>
                <img th:src="${#authentication.principal.attributes['avatar_url']}"
                     alt="avatar" class="w-8 h-8 rounded-full border-2 border-white/50">
                <span class="text-sm opacity-90">
                    Привет, <strong th:text="${#authentication.principal.attributes['login']}"></strong>!
                </span>
                <form th:action="@{/logout}" method="post" id="logoutForm">
                    <!-- Кнопка с вызовом функции очистки данных -->
                    <button type="submit" onclick="clearAllData()"
                            class="bg-white/20 hover:bg-white/30 transition text-sm px-3 py-1 rounded-full flex items-center gap-1.5">
                        <i class="fas fa-sign-out-alt text-xs"></i> Выйти
                    </button>
                </form>
            </div>
        </div>
        <!-- Подзаголовок -->
        <div class="text-center mb-10 mt-6">
            <h1 class="text-white text-2xl font-bold mb-1">🎯 Режим фокуса</h1>
            <p class="text-white/60 text-sm">Одна задача за раз. Сделай и двигайся дальше.</p>
        </div>
        <!-- Контейнер для одной задачи по центру -->
        <div class="flex items-center justify-center" style="min-height: 320px;">
            <div id="focusArea"></div>
        </div>
    </div>

    <!-- FAB-инбокс: теперь по классу и data-target -->
    <div class="fab fab-add-inbox" data-target="#inboxInputBar"
         style="background: #f97316; position: fixed; bottom: 2rem; right: 2rem;">
        <i class="fas fa-plus fab-add-inbox-icon"></i>
    </div>

    <!-- Инлайн-поле ввода инбокса -->
    <div id="inboxInputBar" class="focus-inbox-input hidden">
        <div class="inbox-input-box">
            <input type="text" id="inboxInputField" placeholder="Быстрая запись в инбокс…"
                   style="flex:1;border:1.5px solid #e2e8f0;border-radius:0.75rem;padding:0.5rem 0.75rem;font-size:0.9rem;outline:none;font-family:inherit;" />
        </div>
    </div>

    <!-- FAB: Навигация на умника -->
    <a href="/tasks" class="fab" id="fabNavMain" style="bottom: 2rem; left: 2rem; background: #f97316; font-size: 1.6rem;">
        🤓
    </a>

    <a href="/tasks" id="doneAllBtn" class="workflow-btn hidden">
        <i class="fas fa-inbox"></i>
        К разбору!
    </a>

    <!-- Модалка: Капча для перехода на Умника -->
    <div id="umnikCaptchaModal" class="modal-overlay hidden" style="display:none;">
        <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="captchaTitle">
            <h2 id="captchaTitle" class="text-lg font-bold text-slate-800 mb-2">Подтвердите переход</h2>
            <div>
                <div class="captcha-question" id="captchaQuestion">Сколько будет 1 + 2?</div>
                <input type="text" id="captchaInput" placeholder="Введите ответ" style="width:100%;border:1.5px solid #e2e8f0;border-radius:0.5rem;padding:0.5rem;margin-top:0.5rem;font-size:1rem;" />
                <div class="captcha-error" id="captchaError" aria-live="polite"></div>
                <div class="flex justify-end gap-2 mt-4">
                    <button id="captchaCancel" class="btn-ghost">Отмена</button>
                    <button id="captchaSubmit" class="btn-primary">Перейти</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/tasks';
        const SPRINT_API_URL = '/api/sprint/tasks';
        const SPRINT_STATUS_URL = '/api/sprint/status';
        const SPRINT_COMPLETE_URL = '/api/sprint/complete';
        const INBOX_API_URL = '/api/inbox';

        let remaining = [];
        let completedCount = 0;
        let totalCount = 0;
        let sprintActive = null;

        if (!window.closeInboxInput) {
            window.closeInboxInput = function (selector = '#inboxInputBar') {
                const el = document.querySelector(selector);
                if (el) el.classList.add('hidden');
            };
        }

        function updateCounter() {
            document.getElementById('taskCounter').textContent = `${completedCount} / ${totalCount}`;
        }

        function evaluateCompleteButton() {
            const doneBtn = document.getElementById('doneAllBtn');

            // Button only appears when there is an active sprint, totalCount > 0 and all tasks completed
            const allCompleted = (totalCount > 0 && completedCount === totalCount);
            if (sprintActive === false) {
                // No active sprint — never show
                doneBtn.classList.add('hidden');
                doneBtn.setAttribute('aria-hidden', 'true');
                return;
            }

            if (allCompleted) {
                doneBtn.classList.remove('hidden');
                doneBtn.setAttribute('aria-hidden', 'false');
            } else {
                doneBtn.classList.add('hidden');
                doneBtn.setAttribute('aria-hidden', 'true');
            }
        }

        function renderCurrentTask() {
            const area = document.getElementById('focusArea');
            const doneBtn = document.getElementById('doneAllBtn');
            if (remaining.length === 0) {
                const allDone = completedCount > 0 || totalCount === 0;
                area.innerHTML = allDone
                    ? `<div class="empty-state task-entering">
                                 <i class="fas fa-trophy"></i>
                                 Все задачи выполнены! 🎉<br/>
                                 <span style="font-size:0.85rem;opacity:0.7;">Можно выдохнуть.</span>
                               </div>`
                    : `<div class="empty-state task-entering">
                                 <i class="fas fa-clipboard-list"></i>
                                 Нет задач в спринте<br/>
                                 <span style="font-size:0.85rem;opacity:0.7;">Выберите задачи в Планировании.</span>
                               </div>`;
                // show/hide done button according to evaluation (uses sprintActive + counters)
                evaluateCompleteButton();
                return;
            }
            doneBtn.classList.add('hidden');

            const task = remaining[0];
            const progressPercent = totalCount > 0 ? (completedCount / totalCount) * 100 : 0;

            area.innerHTML = `
                                        <div class="focus-card task-entering" id="focusCard">
                                          <div class="flex items-start gap-4">
                                            <div class="focus-check" id="focusCheck" title="Выполнить">
                                              <i class="fas fa-check"></i>
                                            </div>
                                            <div class="flex-1 min-w-0">
                                              <h2 class="text-lg font-bold text-slate-800 mb-2">${escHtml(task.title)}</h2>
                                              <p class="text-sm text-slate-500 leading-relaxed">${escHtml(task.content)}</p>
                                            </div>
                                          </div>
                                          <!-- Прогресс-бар внизу карточки -->
                                          <div class="mt-5 h-1 rounded-full bg-slate-100 overflow-hidden">
                                            <div class="h-full rounded-full transition-all duration-500" style="width: ${progressPercent}%; background: linear-gradient(90deg, #667eea, #764ba2);"></div>
                                          </div>
                                        </div>
                                      `;

            document.getElementById('focusCheck').addEventListener('click', () => completeCurrentTask());
        }

        async function refreshSprintStatus() {
            try {
                const res = await fetch(SPRINT_STATUS_URL);
                if (!res.ok) {
                    if (res.status === 404) {
                        sprintActive = false;
                        return null;
                    }
                    throw new Error(`HTTP ${res.status}`);
                }
                const status = await res.json();
                if (typeof status.active !== 'undefined') sprintActive = !!status.active;
                if (typeof status.total === 'number') totalCount = status.total;
                if (typeof status.remaining === 'number')
                    completedCount = Math.max(0, totalCount - status.remaining);
                // If we already have remaining array, keep it in sync by trimming if mismatch
                if (Array.isArray(remaining) && remaining.length !== status.remaining) {
                    // Do not mutate server state here — just align UI remaining length if possible
                    // If server reports remaining > 0 but our remaining array is empty, we will refresh tasks separately.
                }
                else {
                    // If status has no remaining, try deducing from previously loaded remaining array
                    if (Array.isArray(remaining)) {
                        totalCount = Math.max(totalCount, remaining.length + completedCount);
                    }
                }
                updateCounter();
                return status;
            } catch (e) {
                console.warn('Не удалось получить статус спринта:', e);
                // keep sprintActive as null (unknown) — fallback to local checks
                return null;
            }
        }

        async function loadTasks() {
            const area = document.getElementById('focusArea');
            area.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Загрузка задач...</div>`;
            try {
                const res = await fetch(SPRINT_API_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                remaining = await res.json();
                totalCount = remaining.length;
                completedCount = 0;

                const status = await refreshSprintStatus();
                if (status) {
                    // If server reports total, reconcile completedCount/remaining array
                    if (typeof status.total === 'number') {
                        totalCount = status.total;
                    }
                    const serverRemaining = typeof status.remaining === 'number' ? status.remaining : remaining.length;
                    completedCount = Math.max(0, totalCount - serverRemaining);
                    // If server says remaining > 0 but our remaining array was shorter, trigger an extra fetch
                    if (serverRemaining > 0 && (!Array.isArray(remaining) || remaining.length !== serverRemaining)) {
                        // try to refresh remaining tasks from server to align
                        try {
                            const res2 = await fetch(SPRINT_API_URL);
                            if (res2.ok) remaining = await res2.json();
                        } catch (e) { /* ignore */ }
                    }
                }

                updateCounter();
                renderCurrentTask();
            } catch (e) {
                area.innerHTML = `
                              <div class="empty-state task-entering">
                                <i class="fas fa-exclamation-triangle"></i>
                                Ошибка загрузки задач<br/>
                                <span style="font-size:0.85rem;opacity:0.7;">${escHtml(e.message)}</span>
                              </div>
                            `;
                // keep done button hidden on load failure
                sprintActive = null;
                evaluateCompleteButton();
            }
        }

        async function completeCurrentTask() {
            const card = document.getElementById('focusCard');
            const check = document.getElementById('focusCheck');
            if (!card || !check || remaining.length === 0) return;

            const currentTask = remaining[0];

            check.classList.add('checked');

            setTimeout(async () => {
                card.classList.remove('task-entering');
                card.classList.add('task-leaving');

                card.addEventListener('animationend', async () => {
                    try {
                        const res = await fetch(`${API_URL}/${currentTask.id}/complete`, { method: 'PATCH' });
                        if (!res.ok && res.status !== 404) {
                            console.warn(`Не удалось завершить задачу: HTTP ${res.status}`);
                        }
                    } catch (e) {
                        console.warn('Ошибка при завершении задачи:', e);
                    }
                    remaining.shift();
                    completedCount++;
                    updateCounter();
                    renderCurrentTask();
                }, { once: true });
            }, 250);
        }

            // Attach sprint-complete handler
            document.addEventListener('DOMContentLoaded', () => {
                const doneBtn = document.getElementById('doneAllBtn');

                doneBtn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    // Guard: only allow when counters indicate full completion
                    if (!(totalCount > 0 && completedCount === totalCount)) return;

                    // prevent double-click
                    if (doneBtn.dataset.loading === 'true') return;
                    doneBtn.dataset.loading = 'true';
                    try {
                        const res = await fetch(SPRINT_COMPLETE_URL, { method: 'POST' });
                        if (res.ok) {
                            // success -> redirect to inbox
                            window.location.href = '/inbox';
                        } else {
                            // show server-provided message when possible
                            let msg = `Ошибка завершения спринта: HTTP ${res.status}`;
                            try {
                                const json = await res.json();
                                if (json && json.message) msg = json.message;
                            } catch (_) { }
                            alert(msg);
                            // keep button visible (do not redirect)
                        }
                    } catch (err) {
                        alert('Сетевая ошибка при завершении спринта. Попробуйте ещё раз.');
                    } finally {
                        doneBtn.dataset.loading = 'false';
                    }
                });

                // initial load
                loadTasks();
            });

        function spawnFabRipple(fabEl) {
            const ring = document.createElement('span');
            ring.className = 'fab-ripple-ring';
            fabEl.appendChild(ring);
            ring.addEventListener('animationend', () => ring.remove());
        }

        async function inboxCreate(title) {
            try {
                const res = await fetch(INBOX_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title })
                });
                if (!res.ok) throw new Error('API not ready');
            } catch (e) {
                console.warn('inboxCreate failed', e);
            }
        }

        window.spawnFabRipple = spawnFabRipple;
        window.inboxCreate = inboxCreate;

        function escHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function clearAllData() {
            // Очищаем localStorage (там может храниться токен)
            try {
                localStorage.clear();
                sessionStorage.clear();
            } catch (e) { }

            // Очищаем все куки (там может быть JSESSIONID и OAuth2 данные)
            document.cookie.split(";").forEach(function (cookie) {
                var name = cookie.split("=")[0].trim();
                if (name) {
                    // Удаляем куку для текущего пути
                    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
                    // Удаляем куку для корневого пути
                    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" + window.location.hostname;
                }
            });
            // Очистка IndexedDB (где GitHub иногда хранит токены)
            if (window.indexedDB) {
                indexedDB.databases().then(dbs => {
                    dbs.forEach(db => {
                        if (db.name) indexedDB.deleteDatabase(db.name);
                    });
                }).catch(() => { });
            }

            // Очистка кэша браузера
            if ('caches' in window) {
                caches.keys().then(names => {
                    names.forEach(name => caches.delete(name));
                });
            }
        }

        //Captcha logic for Umnik navigation
        (function () {

            let currentCaptcha = null;

            const modal = document.getElementById('umnikCaptchaModal');
            const qEl = document.getElementById('captchaQuestion');
            const input = document.getElementById('captchaInput');
            const err = document.getElementById('captchaError');
            const btnSubmit = document.getElementById('captchaSubmit');
            const btnCancel = document.getElementById('captchaCancel');
            const fab = document.getElementById('fabNavMain');
            let countError = 0;

            function generateCaptcha() {
                function evalExpr(nums, ops) {
                    let val = nums[0];
                    for (let i = 0; i < ops.length; i++) {
                        if (ops[i] === '+') val += nums[i + 1];
                        else val -= nums[i + 1];
                    }
                    return val;
                }

                for (let attempt = 0; attempt < 200; attempt++) {
                    const n = Math.random() < 0.5 ? 2 : 3;
                    const nums = Array.from({ length: n }, () => Math.floor(Math.random() * 8) + 1);

                    if (nums.every(x => x === 0)) continue;

                    const ops = [];
                    for (let i = 0; i < n - 1; i++) ops.push(Math.random() < 0.5 ? '+' : '-');

                    const value = evalExpr(nums, ops);
                    if (value >= 1 && value <= 10) {

                        let parts = [String(nums[0])];
                        for (let i = 0; i < ops.length; i++) {
                            parts.push(` ${ops[i]} ` + String(nums[i + 1]));
                        }
                        const expr = parts.join('');
                        return { expr, answer: value };
                    }
                }
            }

            function openModal() {
                currentCaptcha = generateCaptcha();
                qEl.textContent = `Решите пример: ${currentCaptcha.expr}`;
                err.textContent = '';
                input.value = '';
                modal.style.display = 'flex';
                modal.classList.remove('hidden');
                setTimeout(() => input.focus(), 50);
            }

            function closeModal() {
                modal.classList.add('hidden');
                modal.style.display = 'none';
                currentCaptcha = null;
                err.textContent = '';
                input.value = '';
            }

            function submitAnswer() {
                if (!currentCaptcha) { err.textContent = 'Ошибка — попробуйте ещё раз.'; return; }
                const val = parseInt(input.value.trim(), 10);
                if (Number.isNaN(val)) {
                    err.textContent = 'Введите числовой ответ';
                    input.focus();
                    return;
                }
                if (val === currentCaptcha.answer) {
                    closeModal();
                    window.location.href = fab.getAttribute('href') || '/tasks';
                } else {

                    if (countError > 1) {
                        err.textContent = 'Неверно — попробуйте другой пример';
                        currentCaptcha = generateCaptcha();
                        qEl.textContent = `Решите пример: ${currentCaptcha.expr}`;
                        countError = 0;
                    }

                    else {
                        err.textContent = 'Неверно — попробуйте ещё раз';
                        countError++;
                    }

                    input.value = '';
                    input.focus();
                }
            }

            fab.addEventListener('click', function (e) {
                e.preventDefault();

                if (Array.isArray(remaining) && remaining.length > 0) {
                    openModal();
                } else {

                    window.location.href = fab.getAttribute('href') || '/tasks';
                }
            });

            // Закрыть при клике по оверлею или по cancel
            modal.addEventListener('click', function (e) {
                if (e.target === modal) closeModal();
            });
            btnCancel.addEventListener('click', closeModal);

            // Submit
            btnSubmit.addEventListener('click', submitAnswer);
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') submitAnswer();
                if (e.key === 'Escape') closeModal();
            });
        })();
        // ── Init ──
        // moved loadTasks() into DOMContentLoaded handler abov
    </script>
    <script src="/js/inbox-fab.js"></script>
</body>
