services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tododb}
      POSTGRES_USER: ${POSTGRES_USER:-todouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todopassword}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  app-api:
    container_name: app-api
    build:
      context: ./server
      dockerfile: AppApi/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING:-Host=postgres;Port=5432;Database=tododb;Username=todouser;Password=todopassword}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8081
    ports:
      - "8081:8081"
    networks:
      - app-network

  web:
    container_name: web
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: http://app-api:8081
    ports:
      - "8080:8080"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
